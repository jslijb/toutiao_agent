# ============================================
# 模型配置文件 - 更换模型只需修改此文件，无需改代码
# ============================================

models:
  # 大语言模型
  llm:
    name: "qwen3-max-2026-01-23"
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.9

  # 文本嵌入模型（用于 RAG）
  embedding:
    name: "text-embedding-v2"
    dimension: 1536         # text-embedding-v1 固定 1536 维
    batch_size: 25          # 每批最大条数（v1 支持最大25）
    batch_interval: 0       # 批次间隔秒数

  # 图片生成模型
  image_gen:
    name: "wanx2.1-t2i-turbo"
    style: "3D卡通"         # 可选: 3D卡通, 扁平插画, 二次元, 水彩, 油画
    size: "1024*1024"       # 可选: 1024*1024, 720*1280, 768*1152, 1280*720
    n: 4                    # 每次生成图片数
    async_mode: true        # true=创建任务+轮询, false=同步返回
    poll_interval: 5        # 轮询间隔秒数
    max_poll_times: 60      # 最大轮询次数（5分钟超时）

# ============================================
# 爬虫配置
# ============================================
crawler:
  # 搜索请求间隔（秒）— 3~6秒平衡速度与反爬
  min_delay: 3
  max_delay: 6

  # 详情页请求间隔（秒）— 比搜索间隔短，同一平台内部不易触发反爬
  detail_min_delay: 1
  detail_max_delay: 2

  # 详情页并发标签页数（同一浏览器内并发打开，加速批量抓取）
  detail_max_concurrent: 3

  # 每平台每次最大爬取文章数
  max_articles_per_platform: 50

  # 每平台并发数
  max_concurrent: 1

  # 重试次数
  max_retries: 3

  # 超时秒数
  timeout: 30

  # 文章保留天数（过期自动清理，0=永不过期）
  article_ttl_days: 30

  # 是否抓取文章详情页全文（搜索页只有摘要，详情页才有完整正文）
  fetch_detail: true

  # 文章最大天数（发布时间超过此天数的文章会被过滤掉，0=不过滤）
  # 365=只保留最近1年的，90=只保留最近3个月，30=只保留最近1个月
  max_article_age_days: 365

  # 主题关键词
  keywords:
    - "职场"
    - "副业"
    - "个人成长"
    - "赚钱"
    - "AI"
    - "创业"
    - "裁员"
    - "晋升"
    - "自由职业"
    - "斜杠"
    - "收入"
    - "技能"
    - "学习"
    - "管理"
    - "领导力"
    - "时间管理"
    - "效率"
    - "认知"
    - "思维"
    - "转型"
    - "跳槽"
    - "面试"

  # 各平台搜索关键词（可覆盖上面的通用关键词）
  platform_keywords: {}

# ============================================
# 文章生成配置
# ============================================
generation:
  # 目标字数
  target_word_count: 1000
  min_word_count: 900
  max_word_count: 1100

  # RAG 检索 Top-K
  rag_top_k: 10

  # 标题候选数量
  title_candidates: 5

  # 敏感词列表文件路径（可选）
  sensitive_words_file: ""

# ============================================
# 热点源配置
# ============================================
hot_topics:
  sources:
    - "toutiao"     # 今日头条热榜
    - "weibo"       # 微博热搜
    - "baidu"       # 百度热搜
  max_topics: 15     # 最大获取热点数
  use_llm_filter: true  # 是否使用 LLM 智能筛选（从关键词过滤后的结果中精选）
  # 热点过滤关键词（与 crawler.keywords 共享，也用于热点筛选）
  # 如果不设置，默认使用 crawler.keywords

# ============================================
# 自动发布配置
# ============================================
publisher:
  # 是否在文章生成后自动发布
  auto_publish: false
  # 浏览器无头模式（false=显示浏览器窗口，便于调试）
  headless: true
  # 默认发布类型: article / micro_toutiao
  publish_type: "article"
  # 默认文章分类（职场/科技/财经/教育/生活等）
  default_category: "职场"
  # 默认发布位置（留空则不添加位置）
  default_location: "xxx"

# ============================================
# 文章去重配置
# ============================================
dedup:
  # 标题 Jaccard 相似度阈值（0~1），超过此值判定为重复标题
  # 0.6 = 标题有60%的词相同即判重，适合宽松模式
  # 0.8 = 标题有80%的词相同才判重，适合严格模式
  title_threshold: 0.6

  # 正文 SimHash Hamming 距离阈值（0~64），小于等于此值判定为重复内容
  # 3 = 几乎完全相同的正文才判重（严格）
  # 5 = 有少量修改的正文也会判重（宽松）
  content_hamming_threshold: 3

  # 参与内容去重的最短正文字数（短文不参与 SimHash 计算）
  min_content_length: 50

  # 是否在爬取时启用语义去重（除了 URL 精确匹配外）
  enable_semantic_dedup: true

  # 是否在 RAG 构建时检查知识库内部重复
  check_rag_duplicates: true

# ============================================
# Web UI 配置
# ============================================
webui:
  host: "127.0.0.1"
  port: 7860
  share: false       # 是否创建公开分享链接
